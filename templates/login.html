<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
 <title>Iniciar Sesión | Evergreen</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 
 
 <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body class="login-body">
 <div class="glass-container">
  <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo de Evergreen" class="header-logo">
  <h1>Iniciar Sesión</h1>

  {% if error %}
 <p class="error-message">{{ error }}</p>
  {% endif %}

  <form id="login-form" method="POST" action="{{ url_for('login') }}" novalidate>
 <div class="input-group">
 <input type="email" name="email" placeholder="Correo Electrónico" required />
 </div>
 <div class="input-group input-group-password">
 <input id="pw" type="password" name="password" placeholder="Contraseña" required />
 
 <button type="button" id="toggle-pw" aria-label="Mostrar u ocultar contraseña">
 <i class="fas fa-eye"></i> 
</button>
 </div>
 <button id="submit-btn" type="submit">Entrar</button>
 </form>

<p class="register-link-text">
 ¿No tienes una cuenta? <a href="{{ url_for('register') }}" class="register-link">Regístrate</a>
 </p>
</div>

 <script>
 const toggleBtn = document.getElementById('toggle-pw');
 const pwInput = document.getElementById('pw');

// Mostrar/ocultar contraseña
 toggleBtn.addEventListener('click', function () {
 const isPassword = pwInput.type === 'password';
 pwInput.type = isPassword ? 'text' : 'password';
 this.innerHTML = isPassword ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
 });

 // Evitar doble envío y dar feedback rápido
 const form = document.getElementById('login-form');
 const submitBtn = document.getElementById('submit-btn');
 form.addEventListener('submit', function () {
submitBtn.disabled = true;
 submitBtn.textContent = 'Ingresando...';
 });
 </script>
</body>
</html>
